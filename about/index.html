          <p>&emsp;&emsp;大学学的是电子信息工程专业，非科班，大学期间也是自学了一点计算机相关的知识，19年毕业后进了上海一家小公司做后台开发，当时主要是做网络协议解码，也算是打开了计算机的大门<br/></p>
<p>&emsp;&emsp;后来又陆续换了两份工作，现在在某大厂干外包，甚是惭愧呀，工作已经四年了，远没有成长到当初预定的目标，中间也经历了一些曲折，不堪回首，希望从现在开始吧，一步一个脚印，好好经营自己以后的人生。</p>
